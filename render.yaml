services:
  # 1. Backend Web Service
  - type: web
    name: iot-portal-backend
    env: node
    plan: free
    rootDir: IoT Mini Project Showcase Portal/IoT Mini Project Showcase Portal/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # To use MySQL instead of ephemeral SQLite, uncomment the following and fill in:
      # - key: DB_DIALECT
      #   value: mysql
      # - key: DB_HOST
      #   value: your-mysql-host
      # - key: DB_PORT
      #   value: "3306"
      # - key: DB_NAME
      #   value: your-database-name
      # - key: DB_USER
      #   value: your-username
      # - key: DB_PASSWORD
      #   sync: false

  # 2. Frontend Static Site
  - type: web
    name: iot-portal-frontend
    runtime: static
    plan: free
    rootDir: IoT Mini Project Showcase Portal/IoT Mini Project Showcase Portal/frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: iot-portal-backend
          type: web
          property: host
